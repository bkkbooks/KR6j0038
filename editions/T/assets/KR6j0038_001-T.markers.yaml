  - {type: variant, offset: 2017, length: 42, content: '靈雲校本末云：

      丙本奧墨書云元祿八年三月十五日點寫畢尊教同九年五月二日一校畢尊教元祿十五年十二月二日以和上御本再校了尊教貞享三年五月初朔校之了。

      同二十四日再校了。

      行本文字多譌，冀得善本正之。淨嚴四十八。', 甲: '', 乙: '', 丙: 貞享三年五月初朔校之了同二十四日再校了行本文字多譌冀得善本正之淨嚴四十八}
